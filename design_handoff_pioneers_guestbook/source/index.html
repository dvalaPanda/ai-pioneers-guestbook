<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>The Pioneers' Guestbook</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script type="application/json" id="speaker-notes">[]</script>

<style>
  :root {
    /* Default palette: Bone + Ink + Burgundy */
    --bg: #f4f1ea;
    --bg-2: #ebe6db;
    --paper: #fbf9f3;
    --ink: #1a1814;
    --ink-2: #2c2823;
    --muted: #7a7468;
    --muted-2: #b6ad9c;
    --line: #d9d2c3;
    --line-2: #c4bba8;
    --accent: #7a2a2a;     /* burgundy */
    --accent-soft: #b8584a;
    --gold: #a08358;

    --font-display: "Fraunces", "Times New Roman", serif;
    --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    overflow: hidden;
  }

  #root { height: 100vh; width: 100vw; overflow: hidden; }

  /* Subtle paper texture */
  body::before {
    content: "";
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(160,131,88,0.025) 0%, transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(122,42,42,0.02) 0%, transparent 60%);
    mix-blend-mode: multiply;
  }

  /* Headings */
  .display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.015em; }
  .label-eyebrow {
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }

  /* Inputs */
  input[type="text"], textarea, select {
    font-family: inherit;
    color: inherit;
    background: transparent;
    border: 0;
    outline: 0;
  }

  /* Buttons */
  button { font-family: inherit; cursor: pointer; }

  /* Loading screen */
  .loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: grid; place-items: center;
    transition: opacity 700ms ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; visibility: hidden; transition: opacity 600ms ease, visibility 0s linear 600ms; }
  .loader-stack { display: flex; flex-direction: column; align-items: center; gap: 28px; }
  .loader-tagline {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.01em;
    opacity: 0;
    animation: fadeInUp 1400ms 600ms ease forwards;
  }
  .loader-mark {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0;
    animation: fadeIn 800ms 200ms ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 0.9; transform: translateY(0); } }

  /* Welcome overlay */
  .welcome {
    position: fixed; inset: 0; z-index: 9998;
    background: rgba(244, 241, 234, 0.86);
    backdrop-filter: blur(14px) saturate(110%);
    -webkit-backdrop-filter: blur(14px) saturate(110%);
    display: grid; place-items: center;
  }

  /* Map svg */
  svg { display: block; }

  /* Pin pulse */
  @keyframes pulseRing {
    0% { r: 3; opacity: 0.7; }
    100% { r: 14; opacity: 0; }
  }
  .pin-pulse { animation: pulseRing 2.4s ease-out infinite; transform-origin: center; }

  /* CTA pulse */
  @keyframes ctaPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(122, 42, 42, 0.35), 0 8px 24px -8px rgba(26, 24, 20, 0.25); }
    50%      { box-shadow: 0 0 0 8px rgba(122, 42, 42, 0), 0 8px 24px -8px rgba(26, 24, 20, 0.25); }
  }
  .cta-pulse { animation: ctaPulse 2.6s ease-in-out infinite; }

  /* Form fields */
  .field {
    border: 0.5px solid var(--line);
    border-radius: 4px;
    padding: 12px 14px;
    background: var(--paper);
    font-size: 14px;
    width: 100%;
    transition: border-color 160ms ease, background 160ms ease;
  }
  .field:focus { border-color: var(--ink-2); background: #fff; }
  .field::placeholder { color: var(--muted-2); }

  /* Generic util */
  .row { display: flex; align-items: center; }
  .col { display: flex; flex-direction: column; }
  .stack-tight > * + * { margin-top: 4px; }

  /* Scrollbars in lists */
  .scroll {
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--line-2) transparent;
  }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

  /* Hover affordance */
  .icon-btn {
    background: transparent;
    border: 0.5px solid var(--line);
    padding: 6px 10px;
    border-radius: 3px;
    color: var(--ink-2);
    font-size: 11px;
    letter-spacing: 0.04em;
    transition: background 160ms ease, border-color 160ms ease;
  }
  .icon-btn:hover { background: var(--paper); border-color: var(--line-2); }
  .icon-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Star button */
  .star-btn { background: transparent; border: 0; padding: 2px; line-height: 0; }

  /* Animations for entries */
  @keyframes entrySlide {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-anim { animation: entrySlide 360ms ease both; }


</style>
</head>
<body>
  <noscript>This guestbook requires JavaScript.</noscript>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
